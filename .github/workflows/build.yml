name: Build

on:
  push:
    tags: ["v*"]        # сборка релиза по тегу vX.Y.Z
  workflow_dispatch:     # и вручную из вкладки Actions

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: TimeCurves-macos.zip
          - os: ubuntu-latest
            asset: TimeCurves-linux.tar.gz
          - os: windows-latest
            asset: TimeCurves-windows.zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller TimeCurves.spec --noconfirm

      - name: Qt runtime libs (Linux, for smoke test)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Smoke test (--selftest on the built binary)
        continue-on-error: true
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            ./dist/TimeCurves.app/Contents/MacOS/TimeCurves --selftest
          elif [ "$RUNNER_OS" = "Windows" ]; then
            ./dist/TimeCurves/TimeCurves.exe --selftest
          else
            QT_QPA_PLATFORM=offscreen ./dist/TimeCurves/TimeCurves --selftest
          fi

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/TimeCurves.app" "${{ matrix.asset }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.asset }}" -C dist TimeCurves

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/TimeCurves -DestinationPath "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
