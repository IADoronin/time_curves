name: Build (Win7 legacy)

# Ветка win7-legacy: сборка на Qt5 (PyQt5) + Python 3.8 — работает на Windows 7/8/10/11.
on:
  push:
    branches: ["win7-legacy"]
    tags: ["win7-v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller TimeCurves.spec --noconfirm

      - name: Smoke test (--selftest)
        continue-on-error: true
        run: ./dist/TimeCurves/TimeCurves.exe --selftest

      - name: Package
        run: Compress-Archive -Path dist/TimeCurves -DestinationPath TimeCurves-win7.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeCurves-win7.zip
          path: TimeCurves-win7.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/win7-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
